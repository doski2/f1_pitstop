name: CI

on:
    push:
        branches: ["master"]
    pull_request:
        branches: ["master"]
permissions:
    contents: read
jobs:
    typecheck:
        name: Type Check (MyPy)
        runs-on: ubuntu-latest
        strategy:
            matrix:
                python-version: ["3.11", "3.12"]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}
            - name: Install mypy
              run: |
                  python -m pip install -U pip
                  pip install mypy
            - name: Run MyPy
              run: |
                  mypy . --ignore-missing-imports

    security:
        name: Security scan (pip-audit)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: '3.11'
            - name: Install pip-audit
                            run: |
                                    python -m pip install -U pip
                                    pip install --prefer-binary -r requirements.txt
                                    pip install pip-audit
            - name: Run pip-audit
              run: |
                  python -m pip_audit --format=columns --progress=off

    build:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                python-version: ["3.9", "3.10", "3.11"]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}
                  cache: "pip"
                  cache-dependency-path: requirements.txt
            - name: Install deps
              run: |
                  python -m pip install -U pip setuptools wheel
                  pip install --prefer-binary -r requirements.txt
                  # Note: don't build an editable wheel for this repository because
                  # the project uses a flat layout with multiple top-level packages
                  # (app, f1m, adapters). Building editable installs with setuptools
                  # fails in that layout on modern setuptools. Instead we add the
                  # repository root to PYTHONPATH before running tests so tests can
                  # import the local packages directly.
            - name: Ruff (format + lint)
              run: |
                  pip install ruff
                  ruff format .
                  ruff check .
                        - name: MyPy
                            # Keep a fast type-check step here; full checks run in `typecheck` job
                            continue-on-error: true
                            run: |
                                    pip install mypy
                                    mypy . --ignore-missing-imports || true
            - name: Run tests
              env:
                  PYTHONPATH: ${{ github.workspace }}
              run: |
                  pip install pytest
                  pytest -q

